name: KoboldCpp Hazir Local AI (EXE Launcher)

on:
  workflow_dispatch:

jobs:
  build-paket:
    runs-on: windows-latest
    steps:
      - name: KoboldCpp son surumunu bul ve indir
        id: kobold
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/LostRuins/koboldcpp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "koboldcpp.exe" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "^koboldcpp[^/\$$*\.exe$" } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Error "koboldcpp.exe bulunamadi! Mevcut dosyalar:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }
          Write-Host "Bulunan: $($asset.name) -> Indiriliyor..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "koboldcpp.exe"

      - name: Minik AI modelini indir (TinyLlama ~640 MB)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
          Invoke-WebRequest -Uri $url -OutFile "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
          $size = (Get-Item "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf").Length
          Write-Host "Model indirildi: $([math]::Round($size/1MB,2)) MB"

      - name: Launcher Python script i (EXE olacak)
        shell: pwsh
        run: |
          $lines = @(
            'import os, sys, subprocess, glob',
            '',
            'def main():',
            '    # EXE neredeyse o klasor',
            '    if getattr(sys, "frozen", False):',
            '        base_dir = os.path.dirname(os.path.abspath(sys.argv[0]))',
            '    else:',
            '        base_dir = os.path.dirname(os.path.abspath(__file__))',
            '',
            '    exe = os.path.join(base_dir, "koboldcpp.exe")',
            '    if not os.path.exists(exe):',
            '        print("HATA: koboldcpp.exe bulunamadi!")',
            '        input("Kapatmak icin Enter a basin...")',
            '        sys.exit(1)',
            '',
            '    models = glob.glob(os.path.join(base_dir, "*.gguf"))',
            '    if not models:',
            '        print("HATA: .gguf model dosyasi bulunamadi!")',
            '        input("Kapatmak icin Enter a basin...")',
            '        sys.exit(1)',
            '',
            '    model = os.path.basename(models[0])',
            '    print("KoboldCpp baslatiliyor...")',
            '    print("Model:", model)',
            '    subprocess.Popen([exe, "--model", model, "--port", "5001", "--launch"], cwd=base_dir)',
            '    print("")',
            '    print("Tarayici acilmazsa: http://localhost:5001")',
            '    print("")',
            '    input("Kapatmak icin Enter a basin...")',
            '',
            'if __name__ == "__main__":',
            '    main()'
          )
          $lines | Set-Content -Path "launcher.py" -Encoding UTF8

      - name: PyInstaller ile BASLAT.exe derle
        shell: pwsh
        run: |
          python -m pip install pyinstaller
          python -m PyInstaller --onefile --name "BASLAT" launcher.py

      - name: Paketle ve zip le
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "Paket" | Out-Null
          Copy-Item "dist\BASLAT.exe" "Paket\"
          Copy-Item "koboldcpp.exe" "Paket\"
          Copy-Item "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf" "Paket\"
          Compress-Archive -Path "Paket\*" -DestinationPath "KoboldCpp-AI-Hazir.zip"

      - name: Artifact olarak yukle v4
        uses: actions/upload-artifact@v4
        with:
          name: KoboldCpp-Hazir-AI-Exe
          path: KoboldCpp-AI-Hazir.zip
          retention-days: 3
