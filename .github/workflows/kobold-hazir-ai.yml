name: KoboldCpp Hazir Local AI Paketi

on:
  workflow_dispatch:

jobs:
  build-paket:
    runs-on: windows-latest
    steps:
      - name: KoboldCpp son surumunu GitHub API ile bul ve indir
        id: kobold
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/LostRuins/koboldcpp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "koboldcpp.exe" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "^koboldcpp[^/\$$*\.exe$" } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Error "koboldcpp.exe bulunamadi! Mevcut asset'ler:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }
          Write-Host "Bulunan dosya: $($asset.name) -> Indiriliyor..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "koboldcpp.exe"

      - name: Minik AI modelini indir (TinyLlama 1.1B Chat ~640 MB)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
          Invoke-WebRequest -Uri $url -OutFile "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
          $size = (Get-Item "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf").Length
          Write-Host "Inen dosya boyutu: $([math]::Round($size/1MB,2)) MB"
          if ($size -lt 10MB) { throw "Model dosyasi cok kucuk, indirme hatasi olabilir!" }

      - name: Paket klasorunu ve BASLAT.bat hazirla
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "KoboldCpp-Hazir-AI" | Out-Null
          Copy-Item "koboldcpp.exe" "KoboldCpp-Hazir-AI\"
          Copy-Item "tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf" "KoboldCpp-Hazir-AI\"
          $bat = @(
            '@echo off',
            'chcp 65001 >nul',
            'cls',
            'echo ========================================',
            'echo    KOBOLDCPP - HAZIR LOCAL AI PAKETI',
            'echo ========================================',
            'echo.',
            'echo Model: TinyLlama 1.1B Chat (Q4_K_M)',
            'echo Bellek yukleniyor, lutfen bekleyin...',
            'echo.',
            'start "" koboldcpp.exe --model tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf --port 5001 --launch',
            'echo.',
            'echo ----------------------------------------',
            'echo Tarayiciniz otomatik acilmazsa:',
            'echo http://localhost:5001',
            'echo.',
            'echo Kapatmak icin bu pencereyi Xleyin.',
            'echo ========================================',
            'pause'
          )
          Set-Content -Path "KoboldCpp-Hazir-AI\BASLAT.bat" -Value $bat -Encoding ASCII

      - name: ZIP'e koy
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Compress-Archive -Path "KoboldCpp-Hazir-AI\*" -DestinationPath "Koldcpp-Hazir-AI-Paketi.zip"
          $sz = (Get-Item "Koldcpp-Hazir-AI-Paketi.zip").Length
          Write-Host "ZIP hazir! Boyut: $([math]::Round($sz/1MB,2)) MB"

      - name: Artifact olarak yukle v4
        uses: actions/upload-artifact@v4
        with:
          name: KoboldCpp-Hazir-AI-Paketi
          path: Koldcpp-Hazir-AI-Paketi.zip
          retention-days: 2
