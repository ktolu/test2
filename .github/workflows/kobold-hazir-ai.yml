name: KoboldCpp Qwen 2.5 Local AI Paketi

on:
  workflow_dispatch:

jobs:
  build-paket:
    runs-on: windows-latest
    steps:
      - name: KoboldCpp son surumunu bul ve indir
        id: kobold
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/LostRuins/koboldcpp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "koboldcpp.exe" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "^koboldcpp[^/\$$*\.exe$" } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Error "koboldcpp.exe bulunamadi! Mevcut dosyalar:"
            $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }
          Write-Host "Bulunan: $($asset.name) -> Indiriliyor..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "koboldcpp.exe"

      - name: Qwen 2.5 7B modelini indir (~4.7 GB)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # 16 GB RAM icin ideal: Qwen 2.5 7B Instruct Q4_K_M
          $url = "https://huggingface.co/TheBloke/Qwen2.5-7B-Instruct-GGUF/resolve/main/qwen2.5-7b-instruct.q4_k_m.gguf"
          Write-Host ">>> Model indiriliyor, bu islem 5-10 dakika surebilir..."
          Invoke-WebRequest -Uri $url -OutFile "qwen2.5-7b-instruct.q4_k_m.gguf"
          
          $size = (Get-Item "qwen2.5-7b-instruct.q4_k_m.gguf").Length
          Write-Host ">>> Indirilen boyut: $([math]::Round($size/1MB,2)) MB"
          if ($size -lt 3000MB) { throw "Model dosyasi tam inmemis olabilir! (Boyut: $size)" }

      - name: Paket klasorunu ve BASLAT.bat hazirla
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "KoboldCpp-Qwen-AI" | Out-Null
          Copy-Item "koboldcpp.exe" "KoboldCpp-Qwen-AI\"
          Copy-Item "qwen2.5-7b-instruct.q4_k_m.gguf" "KoboldCpp-Qwen-AI\"
          
          $bat = @(
            '@echo off',
            'chcp 65001 >nul',
            'cls',
            'echo ========================================',
            'echo    KOBOLDCPP + QWEN 2.5 7B LOCAL AI',
            'echo ========================================',
            'echo.',
            'echo Model: Qwen 2.5 7B Instruct (Q4_K_M)',
            'echo Bellek yukleniyor, lutfen bekleyin...',
            'echo (Ilk acilista 30-60 saniye surulebilir)',
            'echo.',
            'start "" koboldcpp.exe --model qwen2.5-7b-instruct.q4_k_m.gguf --port 5001 --launch',
            'echo.',
            'echo ----------------------------------------',
            'echo Tarayiciniz otomatik acilmazsa:',
            'echo http://localhost:5001',
            'echo.',
            'echo Turkce sorular sorabilirsiniz!',
            'echo ========================================',
            'pause'
          )
          Set-Content -Path "KoboldCpp-Qwen-AI\BASLAT.bat" -Value $bat -Encoding ASCII
          
          $readme = @(
            'KOBOLDCPP + QWEN 2.5 PAKETI',
            '===========================',
            'Nasil Kullanilir:',
            '1. BASLAT.bat a cift tikla.',
            '2. Siyah pencere acilsin, bekleyin (RAM e yukleniyor).',
            '3. Tarayici otomatik acilir.',
            '4. Kobold arayuzundeki kutuya Turkce veya Ingilizce yaz.',
            '',
            'Qwen 2.5 Hakkinda:',
            '- 7 milyar parametre',
            '- Cok iyi Turkce anlar ve yazilar.',
            '- Bilgisayarinda calisir, hic veri disari gitmez.',
            '',
            'Sistem Gereksinimi:',
            '- RAM: En az 6-7 GB bos bellek (16 GB varsa rahat calisir).',
            '- Disk: ~5.5 GB bos alan.',
            '- Isletim Sistemi: Windows 10/11 64-bit',
            '',
            'Sorun Giderme:',
            '- Eger "AVX" hatasi alirsan daha eski KoboldCpp dene.',
            '- Tarayici acilmazsa elle http://localhost:5001 yaz.'
          )
          Set-Content -Path "KoboldCpp-Qwen-AI\README.txt" -Value $readme -Encoding UTF8

      - name: ZIP e koy
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Compress-Archive -Path "KoboldCpp-Qwen-AI\*" -DestinationPath "Qwen-7B-Hazir-Paket.zip"

      - name: Artifact olarak yukle v4
        uses: actions/upload-artifact@v4
        with:
          name: Qwen-7B-Hazir-Paket
          path: Qwen-7B-Hazir-Paket.zip
          retention-days: 2
