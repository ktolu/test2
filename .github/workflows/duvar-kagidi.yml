name: Lively Portable Oluştur

on:
  workflow_dispatch:

jobs:
  create-portable:
    runs-on: windows-latest
    steps:
      - name: Gerekli Dosyaları İndir
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/rocksdanister/lively/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*setup*.exe" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "LivelySetup.exe"

      - name: Kurulumu Sessiz Modda Çalıştır
        shell: cmd
        run: |
          start /wait LivelySetup.exe /S
          xcopy "C:\Program Files\Lively" LivelyPortable /E /I /H /Y

      - name: ZIP Oluştur
        shell: pwsh
        run: |
          Compress-Archive -Path "LivelyPortable" -DestinationPath "LivelyPortable.zip"

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: LivelyPortable
          path: LivelyPortable.zip
          retention-days: 7
