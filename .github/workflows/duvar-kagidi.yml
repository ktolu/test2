name: Lively EXE Deneme

on:
  workflow_dispatch:

jobs:
  indir:
    runs-on: windows-latest
    steps:
      - name: EXE Dosyasını İndir ve Paketle
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/rocksdanister/lively/releases/latest"
          $asset = $release.assets | Where-Object { $_.name.EndsWith(".exe") } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "EXE bulunamadı."
            exit 1
          }
          Write-Host "İndiriliyor: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $asset.name
          New-Item -ItemType Directory -Force -Path "Lively"
          Move-Item $asset.name "Lively\$($asset.name)"
          Compress-Archive -Path "Lively" -DestinationPath "Lively.zip"

      - name: Zip'i yükle
        uses: actions/upload-artifact@v4
        with:
          name: lively-portable
          path: Lively.zip
