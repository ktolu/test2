name: Canlı Duvar Kağıdı App Paketi

on:
  workflow_dispatch:

jobs:
  build-paket:
    runs-on: windows-latest
    steps:
      - name: KoboldCpp son sürümü bul ve indir
        id: kobold
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/LostRuins/koboldcpp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "koboldcpp.exe" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -match "^koboldcpp.+\.exe$" } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Error "koboldcpp.exe bulunamadı!"
            exit 1
          }
          Write-Host "Bulunan: $($asset.name) -> İndiriliyor..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "koboldcpp.exe"

      - name: Qwen 2.5 7B modelini indir (resmi HF)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://huggingface.co/Qwen/Qwen2.5-7B-Instruct-GGUF/resolve/main/qwen2.5-7b-instruct-q4_k_m.gguf"
          Write-Host "Model indiriliyor (~4.7 GB)..."
          curl.exe -L --fail --retry 3 -o "model.gguf" $url

      - name: Paket klasörünü ve başlatıcı BAT dosyasını hazırla
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "CanliDuvarKagidi" | Out-Null
          Copy-Item "koboldcpp.exe" "CanliDuvarKagidi\"
          Copy-Item "model.gguf" "CanliDuvarKagidi\"

          $bat = @(
            '@echo off',
            'chcp 65001 >nul',
            'cls',
            'echo ========================================',
            'echo    CANLI DUWAR KAĞIDI AI',
            'echo ========================================',
            'setlocal enabledelayedexpansion',
            'set "MODEL="',
            'for %%f in (*.gguf) do (',
            '  set "MODEL=%%f"',
            '  goto :found',
            ')',
            'echo HATA: Model dosyası bulunamadı!',
            'pause',
            'exit /b 1',
            ':found',
            'start "" koboldcpp.exe --model "!MODEL!" --port 5001 --launch',
            'echo Tarayıcıda http://localhost:5001 adresinden erişebilirsiniz.',
            'pause'
          )
          Set-Content -Path "CanliDuvarKagidi\BASLAT.bat" -Value $bat -Encoding ASCII

      - name: ZIP yap
        shell: pwsh
        run: |
          Compress-Archive -Path "CanliDuvarKagidi\*" -DestinationPath "CanliDuvarKagidi-Paket.zip"

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: CanliDuvarKagidi-Paket
          path: CanliDuvarKagidi-Paket.zip
          retention-days: 2
